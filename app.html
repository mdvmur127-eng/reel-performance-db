<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reels DB</title>
    <link rel="stylesheet" href="/styles.css?v=20260306f" />
  </head>
  <body>
    <main class="app">
      <header class="top">
        <div>
          <h1>Reels Database</h1>
          <p class="sub">Track all reel fields in one place.</p>
        </div>
        <div class="user-actions">
          <span id="user-email" class="meta"></span>
          <button id="logout-btn" type="button" class="secondary">Log Out</button>
        </div>
      </header>

      <details class="panel panel-collapsible" open>
        <summary class="section-head collapsible-summary">
          <h2 id="form-title">Add Reel</h2>
        </summary>
        <div class="collapsible-content">
          <div class="section-head section-head-inline">
            <span class="meta"></span>
            <button id="cancel-edit-btn" type="button" class="secondary hidden">Cancel Edit</button>
          </div>

          <form id="reel-form" class="form-grid" method="post" action="#">
            <div id="fields-basic" class="field-grid"></div>

            <details class="details" open>
              <summary>Performance Metrics</summary>
              <div id="fields-performance" class="field-grid"></div>
            </details>

            <details class="details">
              <summary>Audience & Distribution</summary>
              <div id="fields-audience" class="field-grid"></div>
            </details>

            <details class="details">
              <summary>Retention Curve (0s to 90s)</summary>
              <div id="fields-seconds" class="seconds-grid"></div>
            </details>

            <div class="form-actions">
              <button id="save-btn" type="submit">Save Reel</button>
            </div>
          </form>
          <p id="form-status" class="meta"></p>
        </div>
      </details>

      <section class="panel">
        <div class="section-head">
          <h2>Saved Reels</h2>
          <div class="section-actions">
            <button id="connect-ig-btn" type="button" class="secondary">Connect IG</button>
            <button id="syncIgBtn" type="button" class="secondary" data-legacy-id="sync-ig-reels-btn">Sync IG Reels (20)</button>
            <button id="refresh-btn" type="button" class="secondary">Refresh</button>
          </div>
        </div>
        <div id="reels-list" class="list"></div>
        <section id="reel-insights-panel" class="reel-insights-panel">
          <h3>Reel Insights</h3>
          <p class="meta">Click a reel title in the table to view visual insights.</p>
          <div id="reel-insights-content"></div>
        </section>
      </section>
    </main>

    <script type="module" src="/main.js?v=20260306f"></script>
  </body>
</html>
